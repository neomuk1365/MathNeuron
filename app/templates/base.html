<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Math Intuition{% endblock %}</title>
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/interactive.css') }}">
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <div class="container nav-container">
            <a href="{{ url_for('main.index') }}" class="logo">
                Math<span>Intuition</span>
            </a>
            <div class="nav-links">
                <a href="{{ url_for('main.learn') }}" class="nav-link">Learn</a>
                <a href="{{ url_for('main.practice') }}" class="nav-link">Practice</a>
                <a href="{{ url_for('main.dashboard') }}" class="nav-link">Dashboard</a>
            </div>
            <button id="theme-toggle" class="theme-toggle" aria-label="Toggle Dark Mode">🌙</button>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
