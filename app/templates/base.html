<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ og_title|default('Math Intuition | Learn Data Science Mathematics') }}{% endblock %}</title>
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="{{ meta_description|default('A premium interactive educational platform teaching Mathematics for Data Science, Machine Learning, AI, and Statistics through intuition over memorization.') }}">
    <meta name="keywords" content="{{ meta_keywords|default('Data Science Math, Machine Learning Mathematics, Statistics, Probability, Math Intuition, Combinatorics') }}">
    <meta name="author" content="Math Neuron">
    
    <!-- Open Graph / Social -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="{{ og_title|default('Math Intuition | Learn Data Science Mathematics') }}">
    <meta property="og:description" content="{{ og_description|default('Learn the foundational mathematics for AI and Data Science by building deep intuition instead of just memorizing formulas.') }}">
    <meta property="og:url" content="{{ request.url }}">
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{ og_title|default('Math Intuition | Learn Data Science Mathematics') }}">
    <meta name="twitter:description" content="{{ og_description|default('Learn the foundational mathematics for AI and Data Science by building deep intuition instead of just memorizing formulas.') }}">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/interactive.css') }}">
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <div class="container nav-container">
            <a href="{{ url_for('main.index') }}" class="logo">
                Math<span>Intuition</span>
            </a>
            <div class="nav-links">
                <a href="{{ url_for('main.learn') }}" class="nav-link">Learn</a>
                <a href="{{ url_for('main.practice') }}" class="nav-link">Practice</a>
                <a href="{{ url_for('main.dashboard') }}" class="nav-link">Dashboard</a>
            </div>
            <button id="theme-toggle" class="theme-toggle" aria-label="Toggle Dark Mode">🌙</button>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
